<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> To Do App</title>
    <link href="to-do.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="heading">

    <h2>To Do App</h2>
        </div>

    <div class="input-box">
        <input
            type="text"
            id="task"
            placeholder="Enter Task"
        >

        <button id="task_btn">
            Add Task
        </button>
    </div>

    <div id="taskSection">


        <div id="taskList">
    <p id="placeholder">
        📝 No tasks yet. Add your first task!
    </p>

        </div>

    </div>

    <button id="delt_Task">
        Delete Selected Task
    </button>

</div>
<script src="to-do.js"></script>
</body>
</html>
